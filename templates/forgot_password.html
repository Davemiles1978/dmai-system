<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - AI Evolution System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 600;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }
        
        .success-message {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }
        
        .info-message {
            background: #e6f3ff;
            color: #0066cc;
            border: 1px solid #b8daff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .back-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Reset Password</h2>
            <p class="subtitle">Enter your email address and we'll send you instructions to reset your password.</p>
            
            <div id="errorMessage" class="message error-message"></div>
            <div id="successMessage" class="message success-message"></div>
            <div id="infoMessage" class="info-message"></div>
            
            <form id="resetForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" 
                           placeholder="Enter your email" required 
                           autocomplete="email">
                </div>
                
                <button type="button" id="resetButton" onclick="requestReset()">
                    <span id="buttonText">Send Reset Instructions</span>
                    <div id="loader" class="loader"></div>
                </button>
            </form>
            
            <div class="back-link">
                <a href="/admin-login">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        function showMessage(elementId, message, type = 'error') {
            const errorEl = document.getElementById('errorMessage');
            const successEl = document.getElementById('successMessage');
            const infoEl = document.getElementById('infoMessage');
            
            errorEl.style.display = 'none';
            successEl.style.display = 'none';
            infoEl.style.display = 'none';
            
            if (type === 'error') {
                errorEl.textContent = message;
                errorEl.style.display = 'block';
            } else if (type === 'success') {
                successEl.textContent = message;
                successEl.style.display = 'block';
            } else {
                infoEl.textContent = message;
                infoEl.style.display = 'block';
            }
        }
        
        function setLoading(isLoading) {
            const button = document.getElementById('resetButton');
            const buttonText = document.getElementById('buttonText');
            const loader = document.getElementById('loader');
            
            if (isLoading) {
                button.disabled = true;
                buttonText.style.display = 'none';
                loader.style.display = 'inline-block';
            } else {
                button.disabled = false;
                buttonText.style.display = 'inline';
                loader.style.display = 'none';
            }
        }
        
        async function requestReset() {
            // Clear previous messages
            showMessage('errorMessage', '', 'error');
            
            const email = document.getElementById('email').value.trim();
            
            // Basic validation
            if (!email) {
                showMessage('errorMessage', 'Please enter your email address');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                showMessage('errorMessage', 'Please enter a valid email address');
                return;
            }
            
            setLoading(true);
            
            // Show info message immediately for better UX
            showMessage('infoMessage', 'Processing your request...', 'info');
            
            try {
                const response = await fetch('/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email
                    })
                });
                
                const data = await response.json();
                
                // Always show success message for security (don't reveal if email exists)
                showMessage('successMessage', 
                    'If an account exists with this email, you will receive password reset instructions.', 
                    'success');
                
                // Clear the form
                document.getElementById('email').value = '';
                
            } catch (error) {
                console.error('Reset request error:', error);
                showMessage('errorMessage', 'Connection error. Please try again.');
            } finally {
                setLoading(false);
            }
        }
        
        // Allow Enter key to submit
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                requestReset();
            }
        });
    </script>
</body>
</html>
