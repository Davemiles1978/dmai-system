<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - AI Evolution System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 600;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .password-requirements {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            padding-left: 5px;
        }
        
        .password-requirements ul {
            list-style: none;
            margin-top: 5px;
        }
        
        .password-requirements li {
            margin-bottom: 3px;
            color: #999;
        }
        
        .password-requirements li.valid {
            color: #3c3;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }
        
        .success-message {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .back-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>Set New Password</h2>
            <p class="subtitle">Enter your new password below.</p>
            
            <div id="errorMessage" class="message error-message"></div>
            <div id="successMessage" class="message success-message"></div>
            
            <form id="resetForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" 
                           placeholder="Enter new password" required 
                           autocomplete="new-password">
                    <div class="password-requirements">
                        Password must:
                        <ul>
                            <li id="lengthReq">Be at least 8 characters</li>
                            <li id="numberReq">Contain at least one number</li>
                            <li id="upperReq">Contain at least one uppercase letter</li>
                        </ul>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" 
                           placeholder="Confirm new password" required 
                           autocomplete="new-password">
                </div>
                
                <button type="button" id="resetButton" onclick="resetPassword()">
                    <span id="buttonText">Update Password</span>
                    <div id="loader" class="loader"></div>
                </button>
            </form>
            
            <div class="back-link">
                <a href="/admin-login">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        function showMessage(elementId, message, type = 'error') {
            const errorEl = document.getElementById('errorMessage');
            const successEl = document.getElementById('successMessage');
            
            errorEl.style.display = 'none';
            successEl.style.display = 'none';
            
            if (type === 'error') {
                errorEl.textContent = message;
                errorEl.style.display = 'block';
            } else {
                successEl.textContent = message;
                successEl.style.display = 'block';
            }
        }
        
        function setLoading(isLoading) {
            const button = document.getElementById('resetButton');
            const buttonText = document.getElementById('buttonText');
            const loader = document.getElementById('loader');
            
            if (isLoading) {
                button.disabled = true;
                buttonText.style.display = 'none';
                loader.style.display = 'inline-block';
            } else {
                button.disabled = false;
                buttonText.style.display = 'inline';
                loader.style.display = 'none';
            }
        }
        
        function validatePassword(password) {
            const lengthReq = document.getElementById('lengthReq');
            const numberReq = document.getElementById('numberReq');
            const upperReq = document.getElementById('upperReq');
            
            // Check length
            if (password.length >= 8) {
                lengthReq.classList.add('valid');
            } else {
                lengthReq.classList.remove('valid');
            }
            
            // Check for number
            if (/\d/.test(password)) {
                numberReq.classList.add('valid');
            } else {
                numberReq.classList.remove('valid');
            }
            
            // Check for uppercase
            if (/[A-Z]/.test(password)) {
                upperReq.classList.add('valid');
            } else {
                upperReq.classList.remove('valid');
            }
            
            return password.length >= 8 && /\d/.test(password) && /[A-Z]/.test(password);
        }
        
        document.getElementById('password').addEventListener('input', function(e) {
            validatePassword(e.target.value);
        });
        
        async function resetPassword() {
            // Clear previous messages
            showMessage('errorMessage', '', 'error');
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            
            // Validate password
            if (!validatePassword(password)) {
                showMessage('errorMessage', 'Password does not meet requirements');
                return;
            }
            
            // Check if passwords match
            if (password !== confirmPassword) {
                showMessage('errorMessage', 'Passwords do not match');
                return;
            }
            
            setLoading(true);
            
            try {
                const response = await fetch('/reset-password/' + token, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        password: password,
                        confirm_password: confirmPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    showMessage('successMessage', data.message, 'success');
                    
                    // Clear form
                    document.getElementById('password').value = '';
                    document.getElementById('confirm_password').value = '';
                    
                    // Redirect to login after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/admin-login';
                    }, 3000);
                } else {
                    showMessage('errorMessage', data.message || 'Failed to reset password');
                }
            } catch (error) {
                console.error('Reset password error:', error);
                showMessage('errorMessage', 'Connection error. Please try again.');
            } finally {
                setLoading(false);
            }
        }
        
        // Allow Enter key to submit
        document.getElementById('confirm_password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                resetPassword();
            }
        });
    </script>
</body>
</html>
