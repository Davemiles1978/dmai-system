<!DOCTYPE html>
<html>
<head>
    <title>DMAI Admin Login</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid #3a3a4f;
            border-radius: 12px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        h1 {
            background: linear-gradient(90deg, #6e8efb, #a777e3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            font-size: 24px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid #3a3a4f;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #6e8efb;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: linear-gradient(90deg, #6e8efb, #a777e3);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .error {
            color: #ff6b6b;
            margin-top: 10px;
            text-align: center;
        }
        .links {
            margin-top: 20px;
            text-align: center;
        }
        .links a {
            color: #6e8efb;
            text-decoration: none;
            font-size: 14px;
            margin: 0 10px;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 DMAI Admin Access</h1>
        <input type="text" id="username" placeholder="Username" value="Baphomet_78">
        <input type="password" id="password" placeholder="Password">
        <button onclick="adminLogin()">Login</button>
        <div class="error" id="error"></div>
        <div class="links">
            <a href="/biometric-login">🔑 Biometric Login</a>
            <a href="/forgot-password">Forgot Password?</a>
        </div>
    </div>

    <script>
        async function adminLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                document.getElementById('error').textContent = 'Please enter username and password';
                return;
            }
            
            try {
                const response = await fetch('/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                if (response.status === 401) {
                    document.getElementById('error').textContent = 'Invalid credentials';
                    return;
                }
                
                const data = await response.json();
                if (data.success) {
                    window.location.href = '/evolution';
                } else {
                    document.getElementById('error').textContent = data.message || 'Invalid credentials';
                }
            } catch (error) {
                document.getElementById('error').textContent = 'Login failed';
                console.error(error);
            }
        }
    </script>
</body>
</html>
