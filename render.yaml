services:
  - type: worker
    name: dmai-evolution
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install -r evolution/cloud_requirements.txt
    startCommand: python evolution/cloud_evolution.py
    envVars:
      - key: HEARTBEAT_URL
        value: https://your-monitor.com/heartbeat  # Optional
      - key: PYTHONUNBUFFERED
        value: true
    autoDeploy: true
    plan: free  # Upgrade later as she grows
