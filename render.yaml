services:
  - type: worker
    name: dmai-evolution
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r evolution/worker-requirements.txt
    startCommand: python evolution/dual_launcher.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: PYTHONUNBUFFERED
        value: true
    plan: free
